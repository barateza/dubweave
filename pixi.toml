[workspace]
name = "dubweave"
version = "0.1.0"
description = "YouTube -> pt-br dubbing pipeline"
authors = ["Gilson Siqueira"]
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["win-64"]

[system-requirements]
cuda = "12.4"

[dependencies]
python = ">=3.10,<3.12"
ffmpeg = "*"
numpy = ">=1.24,<2.0"          # gruut requires <2.0
networkx = ">=2.5,<3.0"        # gruut requires <3.0

pytorch = { version = ">=2.1", channel = "pytorch" }
torchvision = { version = "*", channel = "pytorch" }
torchaudio = { version = "*", channel = "pytorch" }
pytorch-cuda = { version = "12.4.*", channel = "pytorch" }
deno = "*"                             # JS runtime for yt-dlp YouTube n-challenge solving

[pypi-dependencies]
yt-dlp = "*"
openai-whisper = "*"
TTS = "==0.22.0"
transformers = ">=4.33,<4.38"  # BeamSearchScorer removed in 4.38; TTS 0.22.0 requires the old API
gradio = "*"
sentencepiece = "*"           # required by NLLB-200 tokenizer
triton-windows = "*"           # Windows port of Triton — GPU kernels for Whisper DTW/median ops

[tasks]
download-nllb   = "python -W ignore::FutureWarning -c \"from transformers import pipeline; pipeline('translation', model='facebook/nllb-200-distilled-600M', src_lang='eng_Latn', tgt_lang='por_Latn'); print('NLLB-200 ready.')\""
download-xtts  = "python -W ignore::FutureWarning -c \"from TTS.api import TTS; TTS('tts_models/multilingual/multi-dataset/xtts_v2'); print('XTTS v2 ready.')\""
fetch-ejs      = "yt-dlp --remote-components ejs:github --skip-download \"https://www.youtube.com/watch?v=dQw4w9WgXcQ\" && echo EJS solver ready."
setup          = { depends-on = ["download-nllb", "download-xtts", "fetch-ejs"] }
start          = "python app.py"